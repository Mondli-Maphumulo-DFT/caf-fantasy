/* ── Save indicator ── */
function SaveDot({status}) {
  const colors = {idle:"transparent", saving:C.amber, saved:C.sage, error:C.error};
  return <span className="save-dot" style={{background:colors[status]||"transparent",marginLeft:6,verticalAlign:"middle",transition:"background 0.3s"}} title={status}/>;
}

/* ── Login Screen ── */
function LoginScreen({onLogin}) {
  const [username, setUsername]   = useState("");
  const [teamName, setTeamName]   = useState("");
  const [badge, setBadge]         = useState("🦁");
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState("");
  const [isNew, setIsNew]         = useState(false);
  const [checked, setChecked]     = useState(false);

  async function checkUsername() {
    const u = username.trim().toLowerCase();
    if (!u) return;
    const {data} = await sb.from("teams").select("id,team_name").eq("username",u).maybeSingle();
    setIsNew(!data);
    if (data) setTeamName(data.team_name);
    setChecked(true);
  }

  async function handleSubmit() {
    const u = username.trim().toLowerCase();
    if (!u) return setError("Enter a username");
    setLoading(true); setError("");
    try {
      if (isNew) {
        const tn = teamName.trim() || u+"'s XI";
        const {data, error: err} = await sb.from("teams")
          .insert({...DEFAULT_ROW, username:u, team_name:tn, badge})
          .select().single();
        if (err) throw err;
        localStorage.setItem("caf_username", u);
        onLogin(data);
      } else {
        const {data, error: err} = await sb.from("teams").select("*").eq("username",u).single();
        if (err) throw err;
        localStorage.setItem("caf_username", u);
        onLogin(data);
      }
    } catch(e) {
      setError(e.message||"Something went wrong");
    }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",background:C.forest,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{css}</style>
      <div style={{width:"100%",maxWidth:380}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:64,height:64,background:C.gold,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}}>⚽</div>
          <div className="cd" style={{fontSize:32,fontWeight:800,color:C.gold,letterSpacing:2}}>CAF FANTASY</div>
          <div className="cb" style={{fontSize:11,color:C.muted,letterSpacing:4,textTransform:"uppercase",marginTop:3}}>Africa Cup · 2025/26</div>
        </div>

        <div style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:14,padding:24,display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>Username</label>
            <div style={{display:"flex",gap:8}}>
              <input className="inp cb" value={username} onChange={e=>{setUsername(e.target.value);setChecked(false);}} onKeyDown={e=>e.key==="Enter"&&checkUsername()} placeholder="e.g. ahmed_k" style={{flex:1}}/>
              {!checked&&<button className="nb cb" onClick={checkUsername}
                style={{background:C.sage+"40",border:`1px solid ${C.sage}`,borderRadius:8,padding:"0 14px",color:C.cream,fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>
                Go →
              </button>}
            </div>
          </div>

          {checked && isNew && (
            <>
              <div className="cb" style={{fontSize:12,color:C.amber,padding:"8px 12px",background:C.amber+"15",borderRadius:8,border:`1px solid ${C.amber}30`}}>
                ✨ New manager! Set up your team below.
              </div>
              <div>
                <label className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>Team Name</label>
                <input className="inp cb" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="e.g. Desert Eagles FC"/>
              </div>
              <div>
                <label className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:8}}>Team Badge</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {BADGES.map(b=>(
                    <button key={b} className="nb" onClick={()=>setBadge(b)}
                      style={{width:40,height:40,borderRadius:8,border:`2px solid ${badge===b?C.gold:C.gold+"20"}`,background:badge===b?C.gold+"20":"transparent",fontSize:20,cursor:"pointer"}}>
                      {b}
                    </button>
                  ))}
                </div>
              </div>
            </>
          )}

          {checked && !isNew && (
            <div className="cb" style={{fontSize:12,color:C.sage,padding:"8px 12px",background:C.sage+"20",borderRadius:8,border:`1px solid ${C.sage}30`}}>
              👋 Welcome back! Loading your team…
            </div>
          )}

          {error && <div className="cb" style={{fontSize:12,color:C.terracotta,padding:"8px 12px",background:C.terracotta+"15",borderRadius:8}}>{error}</div>}

          {checked && (
            <button className="btn-gold" onClick={handleSubmit} disabled={loading}>
              {loading ? "Loading…" : isNew ? "Create Team" : "Enter"}
            </button>
          )}
        </div>

        <div className="cb" style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:16}}>
          No password needed · Each player picks their own username
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [teamRow, setTeamRow]     = useState(null);    // raw DB row
  const [tab, setTab]             = useState("dashboard");
  const [saveStatus, setSaveStatus] = useState("idle"); // idle|saving|saved|error
  const [filterPos, setFilterPos] = useState("ALL");
  const [sortBy, setSortBy]       = useState("pts");
  const [selected, setSelected]   = useState(null);
  const [leagueData, setLeagueData] = useState([]);
  const [leagueLoading, setLeagueLoading] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [nameInput, setNameInput] = useState("");
  const saveTimer = useRef(null);

  /* ── Derived squad ── */
  const squad = teamRow ? {
    GK:    byIds(teamRow.gk_ids),
    DEF:   byIds(teamRow.def_ids),
    MID:   byIds(teamRow.mid_ids),
    FWD:   byIds(teamRow.fwd_ids),
    BENCH: byIds(teamRow.bench_ids),
  } : null;

  const squadList = squad ? [...squad.GK,...squad.DEF,...squad.MID,...squad.FWD,...squad.BENCH] : [];
  const squadIds  = new Set(squadList.map(p=>p.id));

  /* ── Auto-save (debounced 800ms) ── */
  const scheduleSave = useCallback((row) => {
    clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async () => {
      const {error} = await sb.from("teams").update({
        team_name: row.team_name, badge: row.badge,
        budget: row.budget, captain_id: row.captain_id,
        gk_ids: row.gk_ids, def_ids: row.def_ids,
        mid_ids: row.mid_ids, fwd_ids: row.fwd_ids,
        bench_ids: row.bench_ids,
      }).eq("id", row.id);
      setSaveStatus(error ? "error" : "saved");
      setTimeout(()=>setSaveStatus("idle"), 2000);
    }, 800);
  }, []);

  function update(patch) {
    setTeamRow(prev => {
      const next = {...prev, ...patch};
      scheduleSave(next);
      return next;
    });
  }

  /* ── Fetch league ── */
  async function fetchLeague() {
    setLeagueLoading(true);
    const {data} = await sb.from("teams").select("username,team_name,badge,gw_pts,total_pts").order("total_pts",{ascending:false});
    if (data) setLeagueData(data.map((r,i)=>({...r,rank:i+1})));
    setLeagueLoading(false);
  }

  useEffect(()=>{ if(tab==="league") fetchLeague(); }, [tab]);

  /* ── Transfers ── */
  const avail = ALL_PLAYERS
    .filter(p=>filterPos==="ALL"||p.pos===filterPos)
    .filter(p=>!squadIds.has(p.id))
    .sort((a,b)=>sortBy==="pts"?b.pts-a.pts:a.price-b.price);

  function confirmTransfer() {
    if (!selected || !teamRow) return;
    const pos = selected.pos;
    const key = pos==="GK"?"gk_ids":pos==="DEF"?"def_ids":pos==="MID"?"mid_ids":"fwd_ids";
    // Add to position (replace last bench player if over limit)
    const newIds = [...(teamRow[key]||[]), selected.id];
    update({ [key]: newIds, budget: +(teamRow.budget - selected.price).toFixed(1) });
    setSelected(null);
  }

  function setCaptain(id) { update({captain_id:id}); }

  const nav = [
    {id:"dashboard",label:"Dashboard",icon:"◈"},
    {id:"squad",    label:"My Squad",  icon:"⚽"},
    {id:"transfers",label:"Transfers", icon:"⇄"},
    {id:"league",   label:"League",    icon:"🏆"},
    {id:"fixtures", label:"Fixtures",  icon:"📅"},
  ];

  if (!teamRow) return null;

  const gwPts    = teamRow.gw_pts;
  const totalPts = teamRow.total_pts;
  const budget   = teamRow.budget;
  const captain  = teamRow.captain_id;

  return (
    <div className="cb" style={{background:C.forest,minHeight:"100vh",color:C.cream}}>
      <style>{css}</style>

      {/* ── Header ── */}
      <div className="geo" style={{background:C.dark,borderBottom:`2px solid ${C.gold}30`,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,background:C.gold,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚽</div>
            <div>
              <div className="cd" style={{fontSize:21,fontWeight:800,letterSpacing:1,color:C.gold,lineHeight:1}}>CAF FANTASY</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:3,textTransform:"uppercase"}}>Africa Cup · 2025/26</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div className="cd" style={{fontSize:17,fontWeight:700,color:C.amber}}>
                GW 27 <SaveDot status={saveStatus}/>
              </div>
              <div style={{fontSize:9,color:C.muted}}>{teamRow.username}</div>
            </div>
            <div style={{width:34,height:34,borderRadius:"50%",background:C.sage,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`2px solid ${C.gold}40`}}>{teamRow.badge}</div>
          </div>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",borderTop:`1px solid ${C.gold}15`}}>
          {nav.map(n=>(
            <button key={n.id} className={`nb cb${tab===n.id?" ta":""}`} onClick={()=>setTab(n.id)}
              style={{flex:1,padding:"9px 4px",fontSize:11,fontWeight:600,color:tab===n.id?C.gold:C.muted,borderBottom:"3px solid transparent",letterSpacing:0.3,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:13}}>{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 12px"}} className="fi">

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Team name banner */}
            <div style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              {editingName ? (
                <>
                  <input className="inp cb" value={nameInput} onChange={e=>setNameInput(e.target.value)} style={{flex:1,fontSize:16}}/>
                  <button className="nb" onClick={()=>{update({team_name:nameInput.trim()||teamRow.team_name});setEditingName(false);}}
                    style={{background:C.gold,color:C.dark,borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
                </>
              ) : (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:26}}>{teamRow.badge}</span>
                    <div>
                      <div className="cd" style={{fontSize:20,fontWeight:800,color:C.gold,lineHeight:1}}>{teamRow.team_name}</div>
                      <div style={{fontSize:10,color:C.muted}}>Manager: {teamRow.username}</div>
                    </div>
                  </div>
                  <button className="nb" onClick={()=>{setNameInput(teamRow.team_name);setEditingName(true);}}
                    style={{fontSize:11,color:C.muted,border:`1px solid ${C.gold}20`,borderRadius:6,padding:"5px 10px"}}>✏️ Edit</button>
                </>
              )}
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[{l:"GW Points",v:gwPts,s:"Rank #1,204",i:"⚡"},{l:"Total Points",v:totalPts.toLocaleString(),s:"Season total",i:"🏅"},{l:"Budget",v:`£${budget.toFixed(1)}m`,s:"Remaining",i:"💰"}].map(s=>(
                <div key={s.l} className="ch" style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                  <div style={{fontSize:20}}>{s.i}</div>
                  <div className="cd" style={{fontSize:24,fontWeight:800,color:C.gold,lineHeight:1.1}}>{s.v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{s.l}</div>
                  <div style={{fontSize:9,color:C.sage,marginTop:1}}>{s.s}</div>
                </div>
              ))}
            </div>

/* ── Root with login gate ── */
function Root() {
  const [teamRow, setTeamRow] = useState(null);
  const [booting, setBooting] = useState(true);

  useEffect(()=>{
    const saved = localStorage.getItem("caf_username");
    if (saved) {
      sb.from("teams").select("*").eq("username",saved).maybeSingle()
        .then(({data})=>{ if(data) setTeamRow(data); setBooting(false); });
    } else {
      setBooting(false);
    }
  },[]);

  if (booting) return (
    <div style={{minHeight:"100vh",background:"#0B2A1A",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:"#D4A017",letterSpacing:2}}>CAF FANTASY</div>
    </div>
  );

  if (!teamRow) return <LoginScreen onLogin={setTeamRow}/>;

  return <App key={teamRow.id} initialTeam={teamRow}/>;
}

/* Re-wire App to accept initialTeam prop */
const _App = App;
function App({initialTeam}) {
  const [teamRow, setTeamRow] = useState(initialTeam);
  // ... rest of App uses teamRow state

  const [tab, setTab]             = useState("dashboard");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [filterPos, setFilterPos] = useState("ALL");
  const [sortBy, setSortBy]       = useState("pts");
  const [selected, setSelected]   = useState(null);
  const [leagueData, setLeagueData] = useState([]);
  const [leagueLoading, setLeagueLoading] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [nameInput, setNameInput] = useState("");
  const saveTimer = useRef(null);

  const squad = teamRow ? {
    GK:    byIds(teamRow.gk_ids),
    DEF:   byIds(teamRow.def_ids),
    MID:   byIds(teamRow.mid_ids),
    FWD:   byIds(teamRow.fwd_ids),
    BENCH: byIds(teamRow.bench_ids),
  } : null;

  const squadList = squad ? [...squad.GK,...squad.DEF,...squad.MID,...squad.FWD,...squad.BENCH] : [];
  const squadIds  = new Set(squadList.map(p=>p.id));

  const scheduleSave = useCallback((row) => {
    clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async () => {
      const {error} = await sb.from("teams").update({
        team_name:row.team_name,badge:row.badge,budget:row.budget,
        captain_id:row.captain_id,gk_ids:row.gk_ids,def_ids:row.def_ids,
        mid_ids:row.mid_ids,fwd_ids:row.fwd_ids,bench_ids:row.bench_ids,
      }).eq("id",row.id);
      setSaveStatus(error?"error":"saved");
      setTimeout(()=>setSaveStatus("idle"),2000);
    },800);
  },[]);

  function update(patch) {
    setTeamRow(prev=>{const next={...prev,...patch};scheduleSave(next);return next;});
  }

  async function fetchLeague() {
    setLeagueLoading(true);
    const {data} = await sb.from("teams").select("username,team_name,badge,gw_pts,total_pts").order("total_pts",{ascending:false});
    if(data) setLeagueData(data.map((r,i)=>({...r,rank:i+1})));
    setLeagueLoading(false);
  }

  useEffect(()=>{if(tab==="league")fetchLeague();},[tab]);

  const avail = ALL_PLAYERS
    .filter(p=>filterPos==="ALL"||p.pos===filterPos)
    .filter(p=>!squadIds.has(p.id))
    .sort((a,b)=>sortBy==="pts"?b.pts-a.pts:a.price-b.price);

  function confirmTransfer(){
    if(!selected||!teamRow)return;
    const pos=selected.pos;

                  <div style={{fontSize:9,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Your players</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {myPl.map(p=>(<div key={p.id} style={{display:"flex",alignItems:"center",gap:4,background:posColors[p.pos].bg+"50",borderRadius:6,padding:"3px 8px"}}><span style={{fontSize:12}}>{p.flag}</span><span style={{fontSize:11,color:posColors[p.pos].text,fontWeight:600}}>{p.name.split(" ").pop()}</span></div>))}
                  </div>
                </div>)}
              </div>);
            })}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root/>);
</script>
</body>
</html>
