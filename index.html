/* ─── POINTS CALCULATOR ─── */
function calcPts(p,isCap,isVice,triple,onPitch){
  if(!onPitch)return 0;
  const s=p.stats;
  let pts=s.mins>=60?2:s.mins>0?1:0;
  if(p.pos==="GK"||p.pos==="DEF"){pts+=s.goals*6;pts+=s.cs*4;pts+=Math.floor(s.saves/3);}
  else if(p.pos==="MID"){pts+=s.goals*5;pts+=s.cs;}
  else{pts+=s.goals*4;}
  pts+=s.assists*3;pts-=s.yc;pts-=s.rc*3;pts+=s.bonus;
  return pts*(isCap?(triple?3:2):isVice?2:1);
}

/* ════════════════════════════════════
   AUTH SCREEN  (email + password)
════════════════════════════════════ */
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | signup
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [teamName,setTeamName]=useState("");
  const [username,setUsername]=useState("");
  const [badge,setBadge]=useState("🦁");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null); // {type:"err"|"ok", text}

  async function handleLogin(){
    if(!email||!password)return setMsg({type:"err",text:"Enter email and password"});
    setLoading(true);setMsg(null);
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)return setMsg({type:"err",text:error.message}),setLoading(false);
    const {data:team}=await sb.from("teams").select("*").eq("user_id",data.user.id).maybeSingle();
    if(!team)return setMsg({type:"err",text:"Account found but no team — please sign up instead."}),setLoading(false);
    setLoading(false);
    onAuth(data.user, team);
  }

  async function handleSignup(){
    if(!email||!password||!username)return setMsg({type:"err",text:"Fill in all fields"});
    if(password.length<6)return setMsg({type:"err",text:"Password must be at least 6 characters"});
    const uv=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
    if(!uv)return setMsg({type:"err",text:"Username can only contain letters, numbers, underscores"});
    setLoading(true);setMsg(null);
    // Check username not taken
    const {data:existing}=await sb.from("teams").select("id").eq("username",uv).maybeSingle();
    if(existing)return setMsg({type:"err",text:"Username already taken"}),setLoading(false);
    // Create auth user
    const {data,error}=await sb.auth.signUp({email,password});
    if(error)return setMsg({type:"err",text:error.message}),setLoading(false);
    if(!data.user)return setMsg({type:"ok",text:"Check your email to confirm your account, then log in!"}),setLoading(false);
    // Create team row
    const tn=teamName.trim()||uv+"'s XI";
    const {data:team,error:te}=await sb.from("teams")
      .insert({...DEFAULT_ROW,user_id:data.user.id,username:uv,team_name:tn,badge})
      .select().single();
    if(te)return setMsg({type:"err",text:te.message}),setLoading(false);
    setLoading(false);
    onAuth(data.user, team);
  }

  async function handleForgot(){
    if(!email)return setMsg({type:"err",text:"Enter your email first"});
    await sb.auth.resetPasswordForEmail(email);
    setMsg({type:"ok",text:"Password reset email sent!"});
  }

  return(
    <div style={{minHeight:"100vh",background:"#080C14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>

          <div className="cd" style={{fontSize:28,fontWeight:800,color:"#FF6B35",letterSpacing:2}}>CAF FANTASY</div>
          <div className="cb" style={{fontSize:10,color:"#6B7A99",letterSpacing:3,textTransform:"uppercase",marginTop:2}}>Africa Cup · 2025/26</div>
        </div>

        {/* Mode toggle */}
        <div style={{display:"flex",gap:0,marginBottom:16,background:"#060A12",borderRadius:10,padding:4,border:"1px solid rgba(255,255,255,0.08)"}}>
          {["login","signup"].map(m=>(
            <button key={m} className="nb cb" onClick={()=>{setMode(m);setMsg(null);}}
              style={{flex:1,padding:"9px",borderRadius:7,fontSize:13,fontWeight:600,background:mode===m?"#FF6B35":"transparent",color:mode===m?"#080C14":"#6B7A99",transition:"all 0.18s"}}>
              {m==="login"?"Sign In":"Create Account"}
            </button>
          ))}
        </div>

        <div style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:14,padding:22,display:"flex",flexDirection:"column",gap:12}}>
          {mode==="signup"&&(
            <>
              <div>
                <div className="cb" style={{fontSize:11,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Username</div>
                <input className="inp cb" value={username} onChange={e=>setUsername(e.target.value)} placeholder="letters, numbers, underscores"/>
              </div>
              <div>
                <div className="cb" style={{fontSize:11,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Team Name</div>
                <input className="inp cb" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="e.g. Desert Eagles FC"/>
              </div>
              <div>
                <div className="cb" style={{fontSize:11,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:7}}>Badge</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {BADGES.map(b=>(<button key={b} className="nb" onClick={()=>setBadge(b)} style={{width:38,height:38,borderRadius:8,border:`2px solid ${badge===b?"#FF6B35":"#FF6B35"+"20"}`,background:badge===b?"#FF6B35"+"20":"transparent",fontSize:19}}>{b}</button>))}
                </div>
              </div>
              <div style={{height:1,background:"rgba(255,107,53,0.01)"}}/>
            </>
          )}
          <div>
            <div className="cb" style={{fontSize:11,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Email</div>
            <input className="inp cb" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleSignup())} placeholder="your@email.com"/>
          </div>
          <div>
            <div className="cb" style={{fontSize:11,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Password</div>
            <input className="inp cb" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleSignup())} placeholder={mode==="signup"?"at least 6 characters":"••••••••"}/>
          </div>

          {msg&&<div className={msg.type==="err"?"err-box cb":"ok-box cb"}>{msg.text}</div>}

          <button className="btn-gold" onClick={mode==="login"?handleLogin:handleSignup} disabled={loading}>
            {loading?"Please wait…":mode==="login"?"Sign In →":"Create Team →"}
          </button>

          {mode==="login"&&(
            <button className="nb cb" onClick={handleForgot} style={{fontSize:11,color:"#6B7A99",textAlign:"center",padding:"4px 0"}}>
              Forgot password?
            </button>
          )}
        </div>
        <div className="cb" style={{fontSize:11,color:"#6B7A99",textAlign:"center",marginTop:12}}>
          Secured by Supabase Auth · your password is never stored by this app
        </div>
      </div>
    </div>
  );
}

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal cb" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:50,height:50,borderRadius:"50%",background:POS[p.pos].bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{p.flag}</div>
          <div style={{flex:1}}>
            <div className="cd" style={{fontSize:20,fontWeight:800,color:"#F0F4FF",lineHeight:1}}>{p.name}</div>
            <div style={{fontSize:12,color:"#6B7A99",marginTop:2}}>{p.club} · <span style={{background:POS[p.pos].bg,color:POS[p.pos].text,padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:700}}>{p.pos}</span></div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="cd" style={{fontSize:22,fontWeight:800,color:"#FF6B35"}}>£{p.price}m</div>
            <div style={{fontSize:11,color:"#6B7A99"}}>Sel: {p.sel}%</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:16}}>
          {[{l:"Total Pts",v:p.pts},{l:"Form",v:p.form.toFixed(1)},{l:"Goals",v:s.goals},{l:"Assists",v:s.assists},
            ...(p.pos==="GK"?[{l:"Saves",v:s.saves},{l:"Clean Sh.",v:s.cs}]:[{l:"Clean Sh.",v:s.cs},{l:"Bonus",v:s.bonus}]),
            {l:"Yellow",v:s.yc},{l:"Red",v:s.rc}
          ].map(x=>(<div key={x.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 6px",border:"1px solid rgba(255,255,255,0.06)",textAlign:"center"}}>
            <div className="cd" style={{fontSize:17,fontWeight:700,color:"#FFD166"}}>{x.v}</div>
            <div style={{fontSize:9,color:"#6B7A99",marginTop:1}}>{x.l}</div>
          </div>))}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>GW28 Fixtures</div>
          {FIXTURES.filter(f=>f.hc===p.nation||f.ac===p.nation).map((f,i)=>{
            const isH=f.hc===p.nation;
            const diff=isH?f.ad:f.hd;
            const dColors=["","#2E7D32","#66BB6A","#FFA726","#EF5350","#B71C1C"];
            return(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid rgba(255,255,255,0.05)`}}>
              <div style={{fontSize:12}}>{isH?f.hf:f.af} {isH?f.away:f.home} <span style={{fontSize:10,color:"#6B7A99"}}>{isH?"(H)":"(A)"}</span></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{background:dColors[diff],color:"white",fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:3}}>{diff}</span>
                <span style={{fontSize:10,color:"#6B7A99"}}>{f.date}</span>
              </div>
            </div>);
          })}
          {FIXTURES.filter(f=>f.hc===p.nation||f.ac===p.nation).length===0&&<div style={{fontSize:12,color:"#6B7A99"}}>No fixtures this GW</div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          {inSquad
            ?<button className="nb ch cb" onClick={onRemove} style={{flex:1,background:"rgba(192,82,42,0.2)",border:"1px solid rgba(192,82,42,0.4)",borderRadius:8,padding:11,color:"#E07272",fontWeight:700,fontSize:14}}>Remove</button>
            :<button className="nb ch cb" onClick={onAdd} disabled={!canAdd} title={reason||""}
                style={{flex:1,background:canAdd?"#FF6B35"+"20":"rgba(255,255,255,0.04)",border:`1px solid ${canAdd?"#FF6B35"+"50":"rgba(255,255,255,0.1)"}`,borderRadius:8,padding:11,color:canAdd?"#FF6B35":"#6B7A99",fontWeight:700,fontSize:14,cursor:canAdd?"pointer":"not-allowed"}}>
                {canAdd?"Add to Squad":reason||"Cannot Add"}
              </button>
          }
          <button className="nb ch cb" onClick={onClose} style={{padding:"11px 16px",border:"1px solid rgba(255,107,53,0.02)",borderRadius:8,color:"#6B7A99",fontSize:14}}>✕</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   MAIN APP
════════════════════════════════════ */
function App({user,initialTeam}){
  const [row,setRow]             = useState(initialTeam);
  const [tab,setTab]             = useState("team");
  const [saveStatus,setSS]       = useState("idle");
  const [modal,setModal]         = useState(null);
  const [tfFilter,setTfFilter]   = useState("ALL");
  const [tfSort,setTfSort]       = useState("pts");
  const [tfSearch,setTfSearch]   = useState("");
  const [leagueData,setLeague]   = useState([]);
  const [leagueLoading,setLL]    = useState(false);
  const [liveCount,setLiveCount] = useState(0); // realtime connected peers
  const [editName,setEditName]   = useState(false);
  const [nameInput,setNameInput] = useState("");
  const [chipMenu,setChipMenu]   = useState(false);
  const saveTimer = useRef(null);
  const rtRef = useRef(null);

  /* ── Realtime: subscribe to league changes ── */
  useEffect(()=>{
    const channel = sb.channel("league_updates")
      .on("postgres_changes",{event:"*",schema:"public",table:"teams"},(payload)=>{
        setLeague(prev=>prev.map(r=>r.user_id===payload.new.user_id?{...r,...payload.new}:r)
          .sort((a,b)=>(b.total_pts||0)-(a.total_pts||0))
          .map((r,i)=>({...r,rank:i+1})));
      })
      .on("presence",{event:"sync"},()=>{
        const state=channel.presenceState();
        setLiveCount(Object.keys(state).length);
      })
      .subscribe(async(status)=>{
        if(status==="SUBSCRIBED"){
          await channel.track({user_id:user.id});
        }
      });
    rtRef.current=channel;
    return()=>{ sb.removeChannel(channel); };
  },[]);

  /* ── Derived ── */
  const squadAll = useMemo(()=>[...byIds(row.gk_ids),...byIds(row.def_ids),...byIds(row.mid_ids),...byIds(row.fwd_ids)],[row]);
  const squadIds = useMemo(()=>new Set(squadAll.map(p=>p.id)),[squadAll]);
  const startIds = useMemo(()=>new Set(row.starting_ids),[row.starting_ids]);
  const chip3x   = row.active_chip==="triple_cap";

  const startGK  = byIds(row.starting_ids).filter(p=>p&&p.pos==="GK");
  const startDEF = byIds(row.starting_ids).filter(p=>p&&p.pos==="DEF");
  const startMID = byIds(row.starting_ids).filter(p=>p&&p.pos==="MID");
  const startFWD = byIds(row.starting_ids).filter(p=>p&&p.pos==="FWD");
  const bench    = byIds(row.bench_ids);

  const gwPts = useMemo(()=>{
    let t=0;
    (row.starting_ids||[]).forEach(id=>{const p=byId(id);if(p)t+=calcPts(p,id===row.captain_id,id===row.vice_captain_id,chip3x,true);});
    if(row.active_chip==="bench_boost")(row.bench_ids||[]).forEach(id=>{const p=byId(id);if(p)t+=calcPts(p,false,false,false,true);});
    t-=(row.transfer_hits||0)*4;
    return t;
  },[row]);

  /* ── Auto-save ── */
  const scheduleSave = useCallback((r)=>{
    clearTimeout(saveTimer.current);setSS("saving");
    saveTimer.current=setTimeout(async()=>{
      const {error}=await sb.from("teams").update({
        team_name:r.team_name,badge:r.badge,budget:r.budget,free_transfers:r.free_transfers,
        transfer_hits:r.transfer_hits,gk_ids:r.gk_ids,def_ids:r.def_ids,mid_ids:r.mid_ids,
        fwd_ids:r.fwd_ids,starting_ids:r.starting_ids,bench_ids:r.bench_ids,
        captain_id:r.captain_id,vice_captain_id:r.vice_captain_id,formation:r.formation,
        chips_used:r.chips_used,active_chip:r.active_chip,
      }).eq("user_id",user.id);
      setSS(error?"error":"saved");setTimeout(()=>setSS("idle"),2000);
    },700);
  },[user.id]);

  function update(patch){setRow(prev=>{const next={...prev,...patch};scheduleSave(next);return next;});}

  /* ── League ── */
  async function fetchLeague(){
    setLL(true);
    const {data}=await sb.from("teams").select("user_id,username,team_name,badge,gw_pts,total_pts").order("total_pts",{ascending:false});
    if(data)setLeague(data.map((r,i)=>({...r,rank:i+1})));
    setLL(false);
  }
  useEffect(()=>{if(tab==="leagues")fetchLeague();},[tab]);

  /* ── Transfer logic ── */
  function canAddPlayer(p){
    if(squadIds.has(p.id))return{ok:false,reason:"Already in squad"};
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    if((row[key]||[]).length>=POS[p.pos].limit)return{ok:false,reason:`Max ${POS[p.pos].limit} ${p.pos}s`};
    if(p.price>row.budget)return{ok:false,reason:"Not enough budget"};
    if(squadAll.filter(q=>q.club===p.club).length>=3)return{ok:false,reason:"Max 3 per club"};
    return{ok:true};
  }

  function addPlayer(p){
    const {ok}=canAddPlayer(p);if(!ok)return;
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    const isFree=(row.free_transfers||0)>0||row.active_chip==="wildcard"||row.active_chip==="free_hit";
    update({[key]:[...(row[key]||[]),p.id],budget:+(row.budget-p.price).toFixed(1),
      free_transfers:isFree?Math.max(0,(row.free_transfers||0)-1):row.free_transfers,
      transfer_hits:isFree?(row.transfer_hits||0):(row.transfer_hits||0)+1});
    setModal(null);
  }

  function removePlayer(p){
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    update({[key]:(row[key]||[]).filter(id=>id!==p.id),
      starting_ids:(row.starting_ids||[]).filter(id=>id!==p.id),
      bench_ids:(row.bench_ids||[]).filter(id=>id!==p.id),
      budget:+(row.budget+p.price).toFixed(1)});
    setModal(null);
  }

  function activateChip(id){
    if((row.chips_used||[]).includes(id))return;
    update({active_chip:id,chips_used:[...(row.chips_used||[]),id]});
    setChipMenu(false);
  }

  async function handleSignOut(){
    await sb.auth.signOut();
    window.location.reload();
  }

  const avail = useMemo(()=>PLAYERS
    .filter(p=>tfFilter==="ALL"||p.pos===tfFilter)
    .filter(p=>p.name.toLowerCase().includes(tfSearch.toLowerCase())||p.club.toLowerCase().includes(tfSearch.toLowerCase()))
    .sort((a,b)=>tfSort==="pts"?b.pts-a.pts:tfSort==="price"?b.price-a.price:b.form-a.form)
  ,[tfFilter,tfSearch,tfSort]);

  const nav=[{id:"team",label:"Pick Team",icon:"⚽"},{id:"transfers",label:"Transfers",icon:"⇄"},{id:"points",label:"Points",icon:"📊"},{id:"leagues",label:"Leagues",icon:"🏆"},{id:"fixtures",label:"Fixtures",icon:"📅"}];

  /* ─ Pitch tile ─ */
  function PitchTile({p}){
    const isCap=p.id===row.captain_id,isVice=p.id===row.vice_captain_id;
    const pts=calcPts(p,isCap,isVice,chip3x,true);
    return(
      <div className="ch" onClick={()=>setModal(p.id)} style={{textAlign:"center",minWidth:60,maxWidth:72,position:"relative"}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:"#0D1220",border:`2px solid ${isCap?"#FF6B35":isVice?"#FFD166":"rgba(255,255,255,0.2)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto"}}>{p.flag}</div>
          {isCap&&<div style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#FF6B35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:"#080C14"}}>C</div>}
          {isVice&&!isCap&&<div style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#FFD166",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:"#080C14"}}>V</div>}
        </div>
        <div style={{background:POS[p.pos].bg,borderRadius:4,padding:"2px 3px",marginTop:2}}><div style={{fontSize:9,fontWeight:600,color:POS[p.pos].text,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:70}}>{p.name.split(" ").pop()}</div></div>
        <div className="cd" style={{fontSize:10,fontWeight:700,color:"#FFD166",marginTop:1}}>{pts}pts</div>
      </div>
    );
  }

  const modalPlayer = modal?byId(modal):null;
  const {ok:mOk,reason:mReason}=modalPlayer?canAddPlayer(modalPlayer):{ok:false,reason:""};

  return(
    <div className="cb" style={{background:"#080C14",minHeight:"100vh",color:"#F0F4FF"}}>
      <style>{css}</style>

      {/* ── HEADER ── */}
      <div className="geo" style={{background:"#080C14",borderBottom:"1px solid rgba(255,107,53,0.2)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:"#FF6B35",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:"0 0 16px rgba(255,107,53,0.3)"}}>⚽</div>
            <div>
              <div className="cd" style={{fontSize:19,fontWeight:800,letterSpacing:2,color:"#FF6B35",lineHeight:1,fontFamily:"'Barlow Condensed',sans-serif"}}>CAF FANTASY</div>
              <div style={{fontSize:8,color:"#6B7A99",letterSpacing:3,textTransform:"uppercase",color:"#6B7A99"}}>Africa Cup · 2025/26</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {liveCount>0&&<span className="live-badge"><span className="pulse-dot"/>{liveCount} online</span>}
            <div style={{textAlign:"right"}}>
              <div className="cd" style={{fontSize:15,fontWeight:700,color:"#FF6B35"}}>GW 27 <SaveDot s={saveStatus}/></div>
              <div style={{fontSize:8,color:"#6B7A99"}}>{row.username||user.email}</div>
            </div>
            <div className="ch" style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,107,53,0.15)",border:"1px solid rgba(255,107,53,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,border:"2px solid rgba(255,107,53,0.04)"}} onClick={handleSignOut} title="Sign out">{row.badge}</div>
          </div>
        </div>
        <div className="tab-bar" style={{maxWidth:900,margin:"0 auto"}}>
          {nav.map(n=>(
            <button key={n.id} className={`tab-btn${tab===n.id?" ta":""}`} onClick={()=>setTab(n.id)}>
              <span style={{fontSize:12}}>{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"12px 10px"}} className="fi">

        {/* ══ PICK TEAM ══ */}
        {tab==="team"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {/* Info bar */}
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1,background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.02)",borderRadius:10,padding:"10px 12px"}}>
                {editName?(
                  <div style={{display:"flex",gap:6}}>
                    <input className="inp cb" value={nameInput} onChange={e=>setNameInput(e.target.value)} style={{flex:1,fontSize:13,padding:"6px 10px"}}/>
                    <button className="nb" onClick={()=>{update({team_name:nameInput.trim()||row.team_name});setEditName(false);}} style={{background:"#FF6B35",color:"#0D1220",borderRadius:6,padding:"0 10px",fontWeight:700,cursor:"pointer"}}>✓</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
                    <div>
                      <div className="cd" style={{fontSize:16,fontWeight:800,color:"#FF6B35",lineHeight:1}}>{row.team_name}</div>
                      <div style={{fontSize:10,color:"#6B7A99"}}>£{row.budget.toFixed(1)}m · {row.free_transfers} FT</div>
                    </div>
                    <button className="nb" onClick={()=>{setNameInput(row.team_name);setEditName(true);}} style={{fontSize:11,color:"#6B7A99",border:"1px solid rgba(255,107,53,0.02)",borderRadius:5,padding:"3px 7px"}}>✏️</button>
                  </div>
                )}
              </div>
              <div style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.02)",borderRadius:10,padding:"10px 12px",textAlign:"center",minWidth:64}}>
                <div style={{fontSize:8,color:"#6B7A99"}}>GW</div>
                <div className="cd" style={{fontSize:24,fontWeight:800,color:"#FFD166",lineHeight:1}}>{gwPts}</div>
              </div>
              <div style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.02)",borderRadius:10,padding:"10px 12px",textAlign:"center",minWidth:64}}>
                <div style={{fontSize:8,color:"#6B7A99"}}>Total</div>
                <div className="cd" style={{fontSize:24,fontWeight:800,color:"#FF6B35",lineHeight:1}}>{row.total_pts||0}</div>
              </div>
            </div>

            {/* Formation + chips */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <select className="inp cb" value={row.formation} onChange={e=>update({formation:e.target.value})} style={{width:"auto",flex:1,padding:"6px 10px",fontSize:12}}>
                {FORMATIONS.map(f=><option key={f} value={f}>{f}</option>)}
              </select>
              <button className="nb ch cb" onClick={()=>setChipMenu(!chipMenu)}
                style={{background:row.active_chip?"#FF6B35"+"25":"#0D1220",border:`1px solid ${row.active_chip?"#FF6B35":"#FF6B35"+"20"}`,borderRadius:8,padding:"6px 12px",fontSize:11,color:row.active_chip?"#FF6B35":"#6B7A99",fontWeight:600,whiteSpace:"nowrap"}}>
                {row.active_chip?CHIPS.find(c=>c.id===row.active_chip)?.icon+" Active":"🃏 Chips"}
              </button>
            </div>

            {chipMenu&&(
              <div style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.02)",borderRadius:12,padding:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {CHIPS.map(c=>{
                  const used=(row.chips_used||[]).includes(c.id)&&row.active_chip!==c.id;
                  const active=row.active_chip===c.id;
                  return(<button key={c.id} className="nb ch" onClick={()=>!used&&activateChip(c.id)}
                    style={{background:active?"rgba(255,107,53,0.15)":used?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.04)",border:`1px solid ${active?"rgba(255,107,53,0.5)":"rgba(255,255,255,0.08)"}`,borderRadius:8,padding:"9px",textAlign:"left",opacity:used?0.4:1,cursor:used?"default":"pointer"}}>
                    <div style={{fontSize:16,marginBottom:3}}>{c.icon}</div>
                    <div className="cd" style={{fontSize:12,fontWeight:700,color:active?"#FF6B35":"#F0F4FF"}}>{c.label}</div>
                    <div style={{fontSize:9,color:"#6B7A99",marginTop:1}}>{used?"Used this season":c.desc}</div>
                  </button>);
                })}
              </div>
            )}

            {/* PITCH */}
            <div style={{background:"#0A5C2E",borderRadius:14,overflow:"hidden",border:`2px solid ${"#06D6A0"}50`,position:"relative"}}>
              <div style={{position:"absolute",inset:0,opacity:0.15,pointerEvents:"none"}}>
                <div style={{position:"absolute",top:"50%",left:"6%",right:"6%",height:1,background:"white"}}/>
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:64,height:64,borderRadius:"50%",border:"1px solid white"}}/>
                <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:"16%",border:"1px solid white",borderTop:"none"}}/>
                <div style={{position:"absolute",bottom:0,left:"20%",right:"20%",height:"16%",border:"1px solid white",borderBottom:"none"}}/>
              </div>
              {[startFWD,startMID,startDEF,startGK].map((row2,ri)=>(
                <div key={ri} style={{display:"flex",justifyContent:"center",gap:4,padding:"10px 4px"}}>
                  {row2.map(p=>p&&<PitchTile key={p.id} p={p}/>)}
                </div>
              ))}
              <div style={{background:"rgba(0,0,0,0.5)",borderTop:`1px dashed ${"#FF6B35"}25`,padding:"8px 4px"}}>
                <div style={{fontSize:9,color:"#6B7A99",textAlign:"center",letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>Bench</div>
                <div style={{display:"flex",justifyContent:"center",gap:8}}>
                  {bench.map((p,i)=>p&&(
                    <div key={p.id} className="ch" onClick={()=>setModal(p.id)} style={{textAlign:"center",minWidth:50,opacity:row.active_chip==="bench_boost"?1:0.6}}>
                      <div style={{position:"relative",display:"inline-block"}}>
                        <div style={{width:34,height:34,borderRadius:"50%",background:"#0D1220",border:`1px solid ${"#6B7A99"}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,margin:"0 auto"}}>{p.flag}</div>
                        <div style={{position:"absolute",top:-4,left:-4,width:13,height:13,borderRadius:"50%",background:"#0D1220",border:`1px solid ${"#6B7A99"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,color:"#6B7A99"}}>{i+1}</div>
                      </div>
                      <div style={{background:POS[p.pos].bg+"70",borderRadius:3,padding:"1px 2px",marginTop:2}}><div style={{fontSize:8,color:POS[p.pos].text}}>{p.name.split(" ").pop()}</div></div>
                      <div className="cd" style={{fontSize:8,color:"#6B7A99"}}>£{p.price}m</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {(row.transfer_hits||0)>0&&(
              <div className="err-box cb">⚠️ {row.transfer_hits} extra transfer{row.transfer_hits>1?"s":""} this GW = -{row.transfer_hits*4} pts</div>
            )}

            {/* Squad list */}
            <div>
              <div className="cd" style={{fontSize:13,fontWeight:700,color:"#FF6B35",letterSpacing:1,marginBottom:8,borderLeft:"3px solid #FF6B35",paddingLeft:8}}>SQUAD ({squadAll.length}/15)</div>
              {["GK","DEF","MID","FWD"].map(pos=>{
                const players=squadAll.filter(p=>p.pos===pos);
                return(<div key={pos} style={{marginBottom:10}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#6B7A99",textTransform:"uppercase",marginBottom:4}}>{pos} — {players.length}/{POS[pos].limit}</div>
                  {players.map(p=>{
                    const isSt=startIds.has(p.id),isCap=p.id===row.captain_id,isVice=p.id===row.vice_captain_id;
                    return(<div key={p.id} className="sr ch" onClick={()=>setModal(p.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,borderLeft:`3px solid ${isSt?POS[pos].text+"60":"transparent"}`}}>
                      <span style={{fontSize:15}}>{p.flag}</span>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                          {isCap&&<span style={{background:"#FF6B35",color:"#080C14",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>CAP</span>}
                          {isVice&&<span style={{background:"#FFD166"+"40",color:"#FFD166",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>V</span>}
                          {!isSt&&<span style={{background:"rgba(255,255,255,0.05)",color:"#6B7A99",fontSize:8,padding:"0 4px",borderRadius:2}}>BENCH</span>}
                        </div>
                        <div style={{fontSize:9,color:"#6B7A99"}}>{p.club} · {p.form.toFixed(1)} form</div>
                      </div>
                      <div style={{display:"flex",gap:3}}>
                        <button className="nb" onClick={e=>{e.stopPropagation();update({captain_id:p.id});}} style={{fontSize:9,color:isCap?"#FF6B35":"#6B7A99",border:`1px solid ${isCap?"#FF6B35":"#6B7A99"+"40"}`,borderRadius:3,padding:"2px 5px"}}>C</button>
                        <button className="nb" onClick={e=>{e.stopPropagation();update({vice_captain_id:p.id});}} style={{fontSize:9,color:isVice?"#FFD166":"#6B7A99",border:`1px solid ${isVice?"#FFD166":"#6B7A99"+"40"}`,borderRadius:3,padding:"2px 5px"}}>V</button>
                      </div>
                      <div className="cd" style={{fontSize:14,fontWeight:700,color:"#FFD166",minWidth:32,textAlign:"right"}}>{p.pts}</div>
                      <div style={{fontSize:10,color:"#6B7A99",minWidth:36,textAlign:"right"}}>£{p.price}m</div>
                    </div>);
                  })}
                </div>);
              })}
            </div>
          </div>
        )}

        {/* ══ TRANSFERS ══ */}
        {tab==="transfers"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              {[{l:"Free Transfers",v:row.free_transfers||0,c:(row.free_transfers||0)>0?"#FF6B35":"#6B7A99"},{l:"Transfer Hits",v:row.transfer_hits||0,c:(row.transfer_hits||0)>0?"#E07272":"#6B7A99"},{l:"Budget",v:`£${(row.budget||0).toFixed(1)}m`,c:"#FF6B35"}].map(s=>(
                <div key={s.l} style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <div className="cd" style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:"#6B7A99",marginTop:1}}>{s.l}</div>
                </div>
              ))}
            </div>
            <input className="inp cb" value={tfSearch} onChange={e=>setTfSearch(e.target.value)} placeholder="Search player or club…" style={{marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
              {["ALL","GK","DEF","MID","FWD"].map(pos=>(
                <button key={pos} className="nb cb" onClick={()=>setTfFilter(pos)}
                  style={{background:tfFilter===pos?"#FF6B35":"#0D1220",color:tfFilter===pos?"#0D1220":"#6B7A99",border:`1px solid ${tfFilter===pos?"#FF6B35":"#FF6B35"+"20"}`,borderRadius:6,padding:"5px 11px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{pos}</button>
              ))}
              <div style={{flex:1}}/>
              {[["pts","Pts"],["price","£"],["form","Form"]].map(([k,l])=>(
                <button key={k} className="nb cb" onClick={()=>setTfSort(k)}
                  style={{background:tfSort===k?"#06D6A0"+"50":"#0D1220",color:tfSort===k?"#F0F4FF":"#6B7A99",border:"1px solid rgba(255,107,53,0.02)",borderRadius:6,padding:"5px 9px",fontSize:10,whiteSpace:"nowrap"}}>{l}</button>
              ))}
            </div>
            {avail.map(p=>{
              const inSq=squadIds.has(p.id);
              const {ok}=canAddPlayer(p);
              return(<div key={p.id} onClick={()=>setModal(p.id)}
                style={{background:"#0D1220",border:`1px solid ${inSq?"rgba(255,107,53,0.4)":"rgba(255,255,255,0.06)"}`,borderRadius:10,padding:"9px 11px",display:"flex",alignItems:"center",gap:9,marginBottom:7,cursor:"pointer",opacity:!inSq&&!ok?0.45:1}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:POS[p.pos].bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{p.flag}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                    <span style={{background:POS[p.pos].bg,color:POS[p.pos].text,fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:2}}>{p.pos}</span>
                    {inSq&&<span style={{background:"#FF6B35"+"20",color:"#FF6B35",fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:2}}>IN</span>}
                  </div>
                  <div style={{fontSize:9,color:"#6B7A99"}}>{p.club} · {p.sel}% sel · {p.form.toFixed(1)} form</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div className="cd" style={{fontSize:15,fontWeight:800,color:"#FFD166"}}>{p.pts}</div>
                  <div className="cd" style={{fontSize:12,fontWeight:700,color:"#FF6B35"}}>£{p.price}m</div>
                </div>
              </div>);
            })}
          </div>
        )}

        {/* ══ POINTS ══ */}
        {tab==="points"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div className="cd" style={{fontSize:19,fontWeight:800,color:"#FF6B35",letterSpacing:1}}>GW 27 POINTS</div>
                <div style={{fontSize:10,color:"#6B7A99"}}>{row.team_name}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="cd" style={{fontSize:28,fontWeight:800,color:"#FFD166"}}>{gwPts}</div>
                <div style={{fontSize:9,color:"#6B7A99"}}>this gameweek</div>
              </div>
            </div>
            {(row.transfer_hits||0)>0&&(
              <div style={{background:"rgba(239,35,60,0.1)",border:"1px solid rgba(239,35,60,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,color:"#FF6B6B"}}>Transfer penalty ({row.transfer_hits} hit{row.transfer_hits>1?"s":""})</span>
                <span className="cd" style={{fontSize:14,fontWeight:700,color:"#E07272"}}>-{(row.transfer_hits||0)*4}</span>
              </div>
            )}
            <div className="cd" style={{fontSize:11,fontWeight:700,color:"#6B7A99",letterSpacing:1,marginBottom:6,paddingLeft:8}}>STARTING XI</div>
            {byIds(row.starting_ids||[]).map(p=>{
              if(!p)return null;
              const isCap=p.id===row.captain_id,isVice=p.id===row.vice_captain_id;
              const pts=calcPts(p,isCap,isVice,chip3x,true);
              const base=calcPts(p,false,false,false,true);
              const s=p.stats;
              return(<div key={p.id} style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:10,marginBottom:7}}>
                <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px"}}>
                  <div style={{fontSize:17}}>{p.flag}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                      {isCap&&<span style={{background:"#FF6B35",color:"#080C14",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>CAP{chip3x?"×3":"×2"}</span>}
                      {isVice&&!isCap&&<span style={{background:"#FFD166"+"30",color:"#FFD166",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>VICE×2</span>}
                    </div>
                    <div style={{display:"flex",gap:7,marginTop:3,flexWrap:"wrap"}}>
                      {s.goals>0&&<span style={{fontSize:9,color:"#72E0A0"}}>⚽×{s.goals}</span>}
                      {s.assists>0&&<span style={{fontSize:9,color:"#FFD166"}}>🅰️×{s.assists}</span>}
                      {s.cs>0&&(p.pos==="GK"||p.pos==="DEF")&&<span style={{fontSize:9,color:"#72C4E0"}}>🛡️CS</span>}
                      {s.saves>0&&p.pos==="GK"&&<span style={{fontSize:9,color:"#72C4E0"}}>🧤{s.saves}</span>}
                      {s.yc>0&&<span style={{fontSize:9,color:"#FFA726"}}>🟨×{s.yc}</span>}
                      {s.rc>0&&<span style={{fontSize:9,color:"#E07272"}}>🟥</span>}
                      {s.bonus>0&&<span style={{fontSize:9,color:"#FF6B35"}}>★{s.bonus}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="cd" style={{fontSize:22,fontWeight:800,color:"#FFD166"}}>{pts}</div>
                    {(isCap||isVice)&&<div style={{fontSize:9,color:"#6B7A99"}}>base {base}</div>}
                  </div>
                </div>
              </div>);
            })}
            <div className="cd" style={{fontSize:11,fontWeight:700,color:"#6B7A99",letterSpacing:1,marginBottom:6,paddingLeft:8,marginTop:8}}>BENCH</div>
            {bench.map(p=>{
              if(!p)return null;
              const pts=row.active_chip==="bench_boost"?calcPts(p,false,false,false,true):0;
              return(<div key={p.id} style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:10,marginBottom:6,padding:"8px 11px",display:"flex",alignItems:"center",gap:9,opacity:0.6}}>
                <div style={{fontSize:15}}>{p.flag}</div>
                <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600}}>{p.name}</span><div style={{fontSize:9,color:"#6B7A99"}}>{p.club}</div></div>
                <div className="cd" style={{fontSize:17,fontWeight:700,color:pts>0?"#FFD166":"#6B7A99"}}>{pts>0?pts:"—"}</div>
              </div>);
            })}
          </div>
        )}

        {/* ══ LEAGUES ══ */}
        {tab==="leagues"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div className="cd" style={{fontSize:19,fontWeight:800,color:"#FF6B35",letterSpacing:1}}>MINI-LEAGUE</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                  <div style={{fontSize:10,color:"#6B7A99"}}>Live standings</div>
                  {liveCount>0&&<span className="live-badge"><span className="pulse-dot"/>{liveCount} online now</span>}
                </div>
              </div>
              <button className="nb cb" onClick={fetchLeague} style={{fontSize:11,color:"#6B7A99",border:"1px solid rgba(255,107,53,0.02)",borderRadius:6,padding:"5px 10px"}}>{leagueLoading?"…":"↻"}</button>
            </div>
            {leagueData.length>=3&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14,alignItems:"end"}}>
                {[leagueData[1],leagueData[0],leagueData[2]].filter(Boolean).map((m,i)=>{
                  const h=[108,128,92][i],r=i===0?2:i===1?1:3;
                  const rc=r===1?"#FF6B35":r===2?"#C0C0C0":"#CD7F32";
                  return(<div key={m.user_id||m.username} style={{textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:2}}>{m.badge}</div>
                    <div style={{fontSize:10,fontWeight:600,marginBottom:2,color:m.user_id===user.id?"#FF6B35":"#F0F4FF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team_name}</div>
                    <div style={{background:rc+"20",border:`1px solid ${rc}40`,borderRadius:"8px 8px 0 0",height:h,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",padding:7}}>
                      <div className="cd" style={{fontSize:22,fontWeight:800,color:rc}}>{r}</div>
                      <div className="cd" style={{fontSize:14,fontWeight:700,color:"#FFD166"}}>{(m.total_pts||0).toLocaleString()}</div>
                      <div style={{fontSize:9,color:"#6B7A99"}}>pts</div>
                    </div>
                  </div>);
                })}
              </div>
            )}
            <div style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:12,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"26px 1fr 52px 40px",padding:"6px 11px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                {["#","Team","Total","GW"].map(h=>(<div key={h} style={{fontSize:8,color:"#6B7A99",fontWeight:700,letterSpacing:1,textTransform:"uppercase",textAlign:h!=="Team"?"center":"left"}}>{h}</div>))}
              </div>
              {leagueLoading&&<div style={{padding:18,textAlign:"center",color:"#6B7A99",fontSize:13}}>Loading…</div>}
              {!leagueLoading&&leagueData.length===0&&<div style={{padding:18,textAlign:"center",color:"#6B7A99",fontSize:13}}>No managers yet — share the link!</div>}
              {leagueData.map((m,i)=>(
                <div key={m.user_id||m.username} className="sr" style={{display:"grid",gridTemplateColumns:"26px 1fr 52px 40px",padding:"8px 11px",alignItems:"center",borderLeft:m.user_id===user.id?`3px solid ${"#FF6B35"}`:"3px solid transparent"}}>
                  <div className="cd" style={{fontSize:13,fontWeight:800,color:i<3?"#FF6B35":"#6B7A99",textAlign:"center"}}>{i+1}</div>
                  <div>
                    <div style={{fontSize:11,fontWeight:m.user_id===user.id?700:500,color:m.user_id===user.id?"#FF6B35":"#F0F4FF"}}>{m.badge} {m.team_name}</div>
                    <div style={{fontSize:8,color:"#6B7A99"}}>{m.username}</div>
                  </div>
                  <div className="cd" style={{fontSize:13,fontWeight:700,color:"#FFD166",textAlign:"center"}}>{(m.total_pts||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:"#6B7A99",textAlign:"center"}}>{m.gw_pts||0}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:10,background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:10,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,color:"#6B7A99"}}>League Code</div>
              <div className="cd" style={{fontSize:18,fontWeight:800,color:"#FF6B35",letterSpacing:4}}>CAF-2526</div>
              <button className="nb cb" onClick={()=>navigator.clipboard?.writeText("caf-fantasy.netlify.app")} style={{background:"rgba(6,214,160,0.1)",border:"1px solid rgba(6,214,160,0.3)",borderRadius:6,padding:"4px 10px",fontSize:10,color:"#F0F4FF"}}>📋 Copy link</button>
            </div>
          </div>
        )}

        {/* ══ FIXTURES ══ */}
        {tab==="fixtures"&&(
          <div>
            <div style={{marginBottom:12}}>
              <div className="cd" style={{fontSize:19,fontWeight:800,color:"#FF6B35",letterSpacing:1}}>GW28 FIXTURES</div>
              <div style={{fontSize:10,color:"#6B7A99"}}>Apr 12–14, 2026 · Difficulty 1(easy)→5(hard)</div>
            </div>
            {FIXTURES.map((f,i)=>{
              const myPl=squadAll.filter(p=>p.nation===f.hc||p.nation===f.ac);
              const dColors=["","#2E7D32","#66BB6A","#FFA726","#EF5350","#B71C1C"];
              return(<div key={i} className="ch" style={{background:"#0D1220",border:`1px solid rgba(255,107,53,0.2)`||"1px solid rgba(255,107,53,0.01)",borderRadius:12,padding:"12px 13px",marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontSize:8,color:"#6B7A99",letterSpacing:1}}>GW28 · {f.date}</div>
                  <div style={{fontSize:10,color:"#FFD166",fontWeight:600}}>{f.time} CAT</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:26}}>{f.hf}</div>
                    <div className="cd" style={{fontSize:11,fontWeight:700,marginTop:2}}>{f.home.toUpperCase()}</div>
                    <div style={{marginTop:3}}><span style={{background:dColors[f.hd],color:"white",fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:3}}>{f.hd}</span></div>
                  </div>
                  <div style={{textAlign:"center",padding:"4px 10px",background:"rgba(6,214,160,0.08)",borderRadius:8,border:"1px solid rgba(6,214,160,0.2)"}}>
                    <div className="cd" style={{fontSize:15,fontWeight:800,color:"#FF6B35"}}>VS</div>
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:26}}>{f.af}</div>
                    <div className="cd" style={{fontSize:11,fontWeight:700,marginTop:2}}>{f.away.toUpperCase()}</div>
                    <div style={{marginTop:3}}><span style={{background:dColors[f.ad],color:"white",fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:3}}>{f.ad}</span></div>
                  </div>
                </div>
                {myPl.length>0&&(
                  <div style={{marginTop:9,paddingTop:9,borderTop:"1px solid rgba(255,107,53,0.01)"}}>
                    <div style={{fontSize:8,color:"#6B7A99",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Your players</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {myPl.map(p=>(<div key={p.id} style={{display:"flex",alignItems:"center",gap:3,background:POS[p.pos].bg+"45",borderRadius:5,padding:"2px 7px"}}>
                        <span style={{fontSize:11}}>{p.flag}</span>
                        <span style={{fontSize:10,color:POS[p.pos].text,fontWeight:600}}>{p.name.split(" ").pop()}</span>
                        {p.id===row.captain_id&&<span style={{fontSize:8,color:"#FF6B35",fontWeight:800}}>C</span>}
                      </div>))}
                    </div>
                  </div>
                )}
              </div>);
            })}
          </div>
        )}
      </div>

      {/* Player modal */}
      {modalPlayer&&(
        <PlayerModal player={modalPlayer} inSquad={squadIds.has(modalPlayer.id)} canAdd={mOk} reason={mReason}
          onAdd={()=>addPlayer(modalPlayer)} onRemove={()=>removePlayer(modalPlayer)} onClose={()=>setModal(null)}/>
      )}
    </div>
  );
}

/* ════════════════════════════════════
   ROOT — session management

function Root(){
  const [authState,setAuthState]=useState(null); // null=loading, false=logged-out, {user,team}=logged-in

  useEffect(()=>{
    // Check existing session
    sb.auth.getSession().then(async({data:{session}})=>{
      if(!session){setAuthState(false);return;}
      const {data:team}=await sb.from("teams").select("*").eq("user_id",session.user.id).maybeSingle();
      setAuthState(team?{user:session.user,team}:false);
    });
    // Listen for auth changes
    const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(!session){setAuthState(false);return;}
      if(event==="SIGNED_IN"||event==="TOKEN_REFRESHED"){
        const {data:team}=await sb.from("teams").select("*").eq("user_id",session.user.id).maybeSingle();
        if(team)setAuthState({user:session.user,team});
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(authState===null)return(
    <div style={{minHeight:"100vh",background:"#080C14",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{css}</style>
      <div className="cd" style={{fontSize:22,fontWeight:800,color:"#FF6B35",letterSpacing:2}}>CAF FANTASY</div>
    </div>
  );

  if(!authState)return <AuthScreen onAuth={(user,team)=>setAuthState({user,team})}/>;
  return <App key={authState.user.id} user={authState.user} initialTeam={authState.team}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
