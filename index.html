/* ─── POINTS CALCULATOR ─── */
function calcPoints(p, isCap, isVice, chipTriple, starting) {
  if (!starting) return 0;
  const s = p.stats;
  let pts = s.mins >= 60 ? 2 : s.mins > 0 ? 1 : 0;
  if (p.pos==="GK"||p.pos==="DEF") { pts += s.goals*6; pts += s.cs*4; pts += Math.floor(s.saves/3); }
  else if (p.pos==="MID") { pts += s.goals*5; pts += s.cs*1; }
  else { pts += s.goals*4; }
  pts += s.assists*3;
  pts -= s.yc*1; pts -= s.rc*3;
  pts += s.bonus;
  const mult = isCap ? (chipTriple?3:2) : isVice ? 2 : 1;
  return pts * mult;
}

function LoginScreen({onLogin}){
  const [u,setU]=useState(""),[tn,setTn]=useState(""),
    [badge,setBadge]=useState("🦁"),[loading,setLoading]=useState(false),
    [err,setErr]=useState(""),[isNew,setIsNew]=useState(false),[checked,setChecked]=useState(false);

  async function check(){
    const uv=u.trim().toLowerCase();if(!uv)return;
    const {data}=await sb.from("teams").select("id,team_name").eq("username",uv).maybeSingle();
    setIsNew(!data);if(data)setTn(data.team_name);setChecked(true);
  }
  async function submit(){
    const uv=u.trim().toLowerCase();if(!uv)return setErr("Enter a username");
    setLoading(true);setErr("");
    try{
      if(isNew){
        const {data,error:e}=await sb.from("teams").insert({...DEFAULT_ROW,username:uv,team_name:tn.trim()||(uv+"'s XI"),badge}).select().single();
        if(e)throw e;localStorage.setItem("caf_u",uv);onLogin(data);
      }else{
        const {data,error:e}=await sb.from("teams").select("*").eq("username",uv).single();
        if(e)throw e;localStorage.setItem("caf_u",uv);onLogin(data);
      }
    }catch(e){setErr(e.message||"Error");}
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100vh",background:C.forest,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{css}</style>
      <div style={{width:"100%",maxWidth:380}}>

          <div className="cd" style={{fontSize:28,fontWeight:800,color:C.gold,letterSpacing:2}}>CAF FANTASY</div>
          <div className="cb" style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase",marginTop:2}}>Africa Cup · 2025/26</div>
        </div>
        <div style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:14,padding:22,display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <div className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Username</div>
            <div style={{display:"flex",gap:8}}>
              <input className="inp cb" value={u} onChange={e=>{setU(e.target.value);setChecked(false);}} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="pick a username" style={{flex:1}}/>

            </div>
          </div>
          {checked&&isNew&&(<>
            <div className="cb" style={{fontSize:12,color:C.amber,padding:"7px 11px",background:C.amber+"15",borderRadius:8}}>✨ New manager — set up your team</div>
            <div>
              <div className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Team Name</div>
              <input className="inp cb" value={tn} onChange={e=>setTn(e.target.value)} placeholder="e.g. Desert Eagles FC"/>
            </div>
            <div>
              <div className="cb" style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:7}}>Badge</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>

            {l:"Total Pts",v:p.pts},{l:"Form",v:p.form.toFixed(1)},
            {l:"Goals",v:s.goals},{l:"Assists",v:s.assists},
            ...(p.pos==="GK"?[{l:"Saves",v:s.saves},{l:"Clean Sheets",v:s.cs}]:[{l:"Clean Sheets",v:s.cs},{l:"Bonus",v:s.bonus}]),
            {l:"Yellow",v:s.yc},{l:"Red",v:s.rc},
          ].map(x=>(
            <div key={x.l} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
              <div className="cd" style={{fontSize:18,fontWeight:700,color:C.amber}}>{x.v}</div>
              <div style={{fontSize:9,color:C.muted,marginTop:1}}>{x.l}</div>
            </div>
          ))}
        </div>

        {/* Fixtures */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Upcoming Fixtures</div>
          {FIXTURES.filter(f=>f.hc===p.nation||f.ac===p.nation).slice(0,3).map((f,i)=>{
            const isHome=f.hc===p.nation;
            const opp=isHome?f.away:f.home;
            const diff=isHome?f.ad:f.hd;
            return(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid rgba(255,255,255,0.05)`}}>
                <div style={{fontSize:12}}>{isHome?f.hf:f.af} {opp} <span style={{fontSize:10,color:C.muted}}>{isHome?"(H)":"(A)"}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <DiffBadge d={diff}/>
                  <span style={{fontSize:11,color:C.muted}}>{f.date}</span>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:8}}>
          {inSquad
            ? <button className="nb ch cb" onClick={onRemove} style={{flex:1,background:"rgba(192,82,42,0.2)",border:"1px solid rgba(192,82,42,0.4)",borderRadius:8,padding:"11px",color:"#E07272",fontWeight:700,fontSize:14}}>Remove Player</button>
            : <button className="nb ch cb" onClick={onAdd} disabled={!canAdd} style={{flex:1,background:canAdd?C.gold+"20":"rgba(255,255,255,0.05)",border:`1px solid ${canAdd?C.gold+"50":"rgba(255,255,255,0.1)"}`,borderRadius:8,padding:"11px",color:canAdd?C.gold:C.muted,fontWeight:700,fontSize:14,cursor:canAdd?"pointer":"not-allowed"}}>
                {canAdd?"Add to Squad":"Cannot Add"}
              </button>
          }
          <button className="nb ch cb" onClick={onClose} style={{padding:"11px 16px",border:`1px solid ${C.gold}20`,borderRadius:8,color:C.muted,fontSize:14}}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   MAIN APP
════════════════════════════════════ */
function App({initialTeam}){
  const [row,setRow]               = useState(initialTeam);
  const [tab,setTab]               = useState("team");
  const [saveStatus,setSS]         = useState("idle");
  const [modal,setModal]           = useState(null);      // player id
  const [transferFilter,setTF]     = useState("ALL");
  const [transferSort,setTS]       = useState("pts");
  const [transferSearch,setTSearch]= useState("");
  const [leagueData,setLeague]     = useState([]);
  const [leagueLoading,setLL]      = useState(false);
  const [editName,setEditName]     = useState(false);
  const [nameInput,setNameInput]   = useState("");
  const [chipMenu,setChipMenu]     = useState(false);
  const saveTimer = useRef(null);

  /* ── derived ── */
  const squadAll = useMemo(()=>[...byIds(row.gk_ids),...byIds(row.def_ids),...byIds(row.mid_ids),...byIds(row.fwd_ids)],[row]);
  const squadIds = useMemo(()=>new Set(squadAll.map(p=>p.id)),[squadAll]);
  const startIds = useMemo(()=>new Set(row.starting_ids),[row.starting_ids]);
  const fmDef    = FORMATION_DEF[row.formation]||FORMATION_DEF["4-3-3"];

  /* Starting XI rows for pitch */
  const startGK  = byIds(row.starting_ids).filter(p=>p.pos==="GK");
  const startDEF = byIds(row.starting_ids).filter(p=>p.pos==="DEF");
  const startMID = byIds(row.starting_ids).filter(p=>p.pos==="MID");
  const startFWD = byIds(row.starting_ids).filter(p=>p.pos==="FWD");
  const bench    = byIds(row.bench_ids);

  const chip3x = row.active_chip==="triple_cap";

  /* Points */
  const gwPts = useMemo(()=>{
    let t=0;
    row.starting_ids.forEach(id=>{
      const p=byId(id);if(!p)return;
      t+=calcPoints(p,id===row.captain_id,id===row.vice_captain_id,chip3x,true);
    });
    if(row.active_chip==="bench_boost"){
      row.bench_ids.forEach(id=>{const p=byId(id);if(p)t+=calcPoints(p,false,false,false,true);});
    }
    t-=row.transfer_hits*4;
    return t;
  },[row]);

  const totalPts = row.total_pts || gwPts;

  /* ── save ── */
  const scheduleSave = useCallback((r)=>{
    clearTimeout(saveTimer.current);
    setSS("saving");
    saveTimer.current=setTimeout(async()=>{
      const {error}=await sb.from("teams").update({
        team_name:r.team_name,badge:r.badge,budget:r.budget,
        free_transfers:r.free_transfers,transfer_hits:r.transfer_hits,
        gk_ids:r.gk_ids,def_ids:r.def_ids,mid_ids:r.mid_ids,fwd_ids:r.fwd_ids,
        starting_ids:r.starting_ids,bench_ids:r.bench_ids,
        captain_id:r.captain_id,vice_captain_id:r.vice_captain_id,
        formation:r.formation,chips_used:r.chips_used,active_chip:r.active_chip,
      }).eq("id",r.id);
      setSS(error?"error":"saved");
      setTimeout(()=>setSS("idle"),2000);
    },700);
  },[]);

  function update(patch){
    setRow(prev=>{const next={...prev,...patch};scheduleSave(next);return next;});
  }

  /* ── league ── */
  async function fetchLeague(){
    setLL(true);
    const {data}=await sb.from("teams").select("username,team_name,badge,gw_pts,total_pts").order("total_pts",{ascending:false});
    if(data)setLeague(data.map((r,i)=>({...r,rank:i+1})));
    setLL(false);
  }
  useEffect(()=>{if(tab==="leagues")fetchLeague();},[tab]);

  /* ── transfer logic ── */
  const avail = useMemo(()=>PLAYERS
    .filter(p=>transferFilter==="ALL"||p.pos===transferFilter)
    .filter(p=>p.name.toLowerCase().includes(transferSearch.toLowerCase())||p.club.toLowerCase().includes(transferSearch.toLowerCase()))
    .sort((a,b)=>transferSort==="pts"?b.pts-a.pts:transferSort==="price"?b.price-a.price:b.form-a.form)
  ,[transferFilter,transferSearch,transferSort]);

  function addPlayer(p){
    if(squadIds.has(p.id))return;
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    const cur=row[key]||[];
    if(cur.length>=POS[p.pos].limit)return;
    const isFree=row.free_transfers>0||row.active_chip==="wildcard"||row.active_chip==="free_hit";
    const hits=isFree?row.transfer_hits:row.transfer_hits+1;
    const ft=isFree?Math.max(0,row.free_transfers-1):row.free_transfers;
    update({[key]:[...cur,p.id],budget:+(row.budget-p.price).toFixed(1),free_transfers:ft,transfer_hits:hits});
    setModal(null);
  }

  function removePlayer(p){
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    const newIds=(row[key]||[]).filter(id=>id!==p.id);
    const newStart=row.starting_ids.filter(id=>id!==p.id);
    const newBench=row.bench_ids.filter(id=>id!==p.id);
    update({[key]:newIds,starting_ids:newStart,bench_ids:newBench,budget:+(row.budget+p.price).toFixed(1)});
    setModal(null);
  }

  function canAdd(p){
    if(squadIds.has(p.id))return false;
    const key=p.pos==="GK"?"gk_ids":p.pos==="DEF"?"def_ids":p.pos==="MID"?"mid_ids":"fwd_ids";
    if((row[key]||[]).length>=POS[p.pos].limit)return false;
    if(p.price>row.budget)return false;
    if(squadAll.filter(q=>q.club===p.club).length>=3)return false;
    return true;
  }

  function toggleCaptain(id){
    if(row.captain_id===id) update({captain_id:row.vice_captain_id,vice_captain_id:id});
    else if(row.vice_captain_id===id) update({vice_captain_id:id});
    else update({captain_id:id});
  }
  function setVice(id){ update({vice_captain_id:id}); }

  function activateChip(id){
    if((row.chips_used||[]).includes(id))return;
    update({active_chip:id});
    setChipMenu(false);
  }

  /* ── nav ── */
  const nav=[
    {id:"team",     label:"Pick Team", icon:"⚽"},
    {id:"transfers",label:"Transfers", icon:"⇄"},
    {id:"points",   label:"Points",    icon:"📊"},
    {id:"leagues",  label:"Leagues",   icon:"🏆"},
    {id:"fixtures", label:"Fixtures",  icon:"📅"},
  ];

  /* ── PITCH PLAYER TILE ── */
  function PitchTile({p,small}){
    const isCap=p.id===row.captain_id, isVice=p.id===row.vice_captain_id;
    const pts=calcPoints(p,isCap,isVice,chip3x,true);
    return(
      <div className="ch" onClick={()=>setModal(p.id)} style={{textAlign:"center",minWidth:small?54:60,maxWidth:small?64:72,position:"relative"}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <div style={{width:small?40:46,height:small?40:46,borderRadius:"50%",background:C.dark,border:`2px solid ${isCap?C.gold:isVice?C.amber:C.sage}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:small?18:22,margin:"0 auto"}}>{p.flag}</div>
          {isCap&&<div style={{position:"absolute",top:-4,right:-4,width:15,height:15,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:C.dark}}>C</div>}
          {isVice&&!isCap&&<div style={{position:"absolute",top:-4,right:-4,width:15,height:15,borderRadius:"50%",background:C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:C.dark}}>V</div>}
        </div>
        <div style={{background:POS[p.pos].bg,borderRadius:4,padding:"1px 3px",marginTop:2}}>
          <div style={{fontSize:small?8:9,fontWeight:600,color:POS[p.pos].text,lineHeight:1.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:small?60:68}}>{p.name.split(" ").pop()}</div>
        </div>
        <div className="cd" style={{fontSize:10,fontWeight:700,color:C.amber,marginTop:1}}>{pts}pts</div>
      </div>
    );
  }

  const modalPlayer = modal ? byId(modal) : null;

  return(
    <div className="cb" style={{background:C.forest,minHeight:"100vh",color:C.cream}}>
      <style>{css}</style>

      {/* ── HEADER ── */}
      <div className="geo" style={{background:C.dark,borderBottom:`2px solid ${C.gold}30`,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,background:C.gold,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>⚽</div>
            <div>
              <div className="cd" style={{fontSize:20,fontWeight:800,letterSpacing:1,color:C.gold,lineHeight:1}}>CAF FANTASY</div>
              <div style={{fontSize:8,color:C.muted,letterSpacing:3,textTransform:"uppercase"}}>Africa Cup · 2025/26</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div className="cd" style={{fontSize:15,fontWeight:700,color:C.amber}}>GW 27 <SaveDot s={saveStatus}/></div>
              <div style={{fontSize:8,color:C.muted}}>{row.username}</div>
            </div>
            <div style={{width:32,height:32,borderRadius:"50%",background:C.sage,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,border:`2px solid ${C.gold}40`}}>{row.badge}</div>
          </div>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",borderTop:`1px solid ${C.gold}15`}}>
          {nav.map(n=>(
            <button key={n.id} className={`nb cb${tab===n.id?" ta":""}`} onClick={()=>setTab(n.id)}
              style={{flex:1,padding:"8px 2px",fontSize:10,fontWeight:600,color:tab===n.id?C.gold:C.muted,borderBottom:"3px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
              <span style={{fontSize:12}}>{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"12px 10px"}} className="fi">

        {/* ══════════════════════
            PICK TEAM
        ══════════════════════ */}
        {tab==="team"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* Top bar */}
            <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
              {/* Team name */}
              <div style={{flex:1,background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:10,padding:"10px 12px"}}>
                {editName?(
                  <div style={{display:"flex",gap:6}}>
                    <input className="inp cb" value={nameInput} onChange={e=>setNameInput(e.target.value)} style={{flex:1,fontSize:13,padding:"6px 10px"}}/>
                    <button className="nb" onClick={()=>{update({team_name:nameInput.trim()||row.team_name});setEditName(false);}} style={{background:C.gold,color:C.dark,borderRadius:6,padding:"0 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
                    <div>
                      <div className="cd" style={{fontSize:17,fontWeight:800,color:C.gold,lineHeight:1}}>{row.team_name}</div>
                      <div style={{fontSize:10,color:C.muted}}>£{row.budget.toFixed(1)}m left · {row.free_transfers} free transfer{row.free_transfers!==1?"s":""}</div>
                    </div>
                    <button className="nb" onClick={()=>{setNameInput(row.team_name);setEditName(true);}} style={{fontSize:11,color:C.muted,border:`1px solid ${C.gold}20`,borderRadius:5,padding:"4px 8px"}}>✏️</button>
                  </div>
                )}
              </div>
              {/* GW pts */}
              <div style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:10,padding:"10px 14px",textAlign:"center",minWidth:72}}>
                <div style={{fontSize:9,color:C.muted}}>GW Pts</div>
                <div className="cd" style={{fontSize:26,fontWeight:800,color:C.amber,lineHeight:1}}>{gwPts}</div>
              </div>
              <div style={{background:C.dark,border:`1px solid ${C.gold}20`,borderRadius:10,padding:"10px 14px",textAlign:"center",minWidth:72}}>
                <div style={{fontSize:9,color:C.muted}}>Total</div>
                <div className="cd" style={{fontSize:26,fontWeight:800,color:C.gold,lineHeight:1}}>{totalPts}</div>
              </div>
            </div>

            {/* Formation + chips row */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{fontSize:10,color:C.muted}}>Formation:</div>
              <select className="inp cb" value={row.formation} onChange={e=>update({formation:e.target.value})}
                style={{width:"auto",padding:"5px 10px",fontSize:12,flex:1}}>
                {FORMATIONS.map(f=><option key={f} value={f}>{f}</option>)}
              </select>
              <button className="nb ch cb" onClick={()=>setChipMenu(!chipMenu)}
                style={{background:row.active_chip?C.gold+"30":C.dark,border:`1px solid ${row.active_chip?C.gold:C.gold+"20"}`,borderRadius:8,padding:"6px 12px",fontSize:11,color:row.active_chip?C.gold:C.muted,fontWeight:600,whiteSpace:"nowrap"}}>
                {row.active_chip?CHIPS.find(c=>c.id===row.active_chip)?.icon+" Active":"🃏 Chips"}
              </button>
            </div>

            {/* Chip menu */}
            {chipMenu&&(
              <div style={{background:C.dark,border:`1px solid ${C.gold}25`,borderRadius:12,padding:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {CHIPS.map(c=>{
                  const used=(row.chips_used||[]).includes(c.id);
                  const active=row.active_chip===c.id;
                  return(
                    <button key={c.id} className="nb ch" onClick={()=>!used&&activateChip(c.id)}
                      style={{background:active?C.gold+"25":used?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.06)",border:`1px solid ${active?C.gold:used?"rgba(255,255,255,0.08)":C.gold+"20"}`,borderRadius:8,padding:"10px 10px",textAlign:"left",opacity:used&&!active?0.4:1,cursor:used?"default":"pointer"}}>
                      <div style={{fontSize:18,marginBottom:4}}>{c.icon}</div>
                      <div className="cd" style={{fontSize:13,fontWeight:700,color:active?C.gold:C.cream}}>{c.label}</div>
                      <div className="cb" style={{fontSize:10,color:C.muted,marginTop:1}}>{used&&!active?"Used":c.desc}</div>
                    </button>
                  );
                })}
              </div>
            )}

            {/* PITCH */}
            <div style={{background:C.pitch,borderRadius:14,overflow:"hidden",border:`2px solid ${C.sage}50`,position:"relative"}}>
              {/* Lines */}
              <div style={{position:"absolute",inset:0,opacity:0.15,pointerEvents:"none"}}>
                <div style={{position:"absolute",top:"50%",left:"6%",right:"6%",height:1,background:"white"}}/>
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:64,height:64,borderRadius:"50%",border:"1px solid white"}}/>
                <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:"16%",border:"1px solid white",borderTop:"none"}}/>
                <div style={{position:"absolute",bottom:0,left:"20%",right:"20%",height:"16%",border:"1px solid white",borderBottom:"none"}}/>
                <div style={{position:"absolute",top:0,left:"35%",right:"35%",height:"6%",border:"1px solid white",borderTop:"none"}}/>
                <div style={{position:"absolute",bottom:0,left:"35%",right:"35%",height:"6%",border:"1px solid white",borderBottom:"none"}}/>
              </div>

              {[{pl:startFWD},{pl:startMID},{pl:startDEF},{pl:startGK}].map((row2,ri)=>(
                <div key={ri} style={{display:"flex",justifyContent:"center",gap:4,padding:"10px 4px"}}>
                  {row2.pl.map(p=><PitchTile key={p.id} p={p}/>)}
                </div>
              ))}

              {/* Bench */}
              <div style={{background:"rgba(0,0,0,0.35)",borderTop:`1px dashed ${C.gold}25`,padding:"8px 4px"}}>
                <div style={{fontSize:9,color:C.muted,textAlign:"center",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Bench</div>
                <div style={{display:"flex",justifyContent:"center",gap:8}}>
                  {bench.map((p,i)=>(
                    <div key={p.id} className="ch" onClick={()=>setModal(p.id)} style={{textAlign:"center",minWidth:52,opacity:row.active_chip==="bench_boost"?1:0.6}}>
                      <div style={{position:"relative",display:"inline-block"}}>
                        <div style={{width:36,height:36,borderRadius:"50%",background:C.dark,border:`1px solid ${C.muted}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,margin:"0 auto"}}>{p.flag}</div>
                        <div style={{position:"absolute",top:-4,left:-4,width:14,height:14,borderRadius:"50%",background:C.dark,border:`1px solid ${C.muted}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:C.muted}}>{i+1}</div>
                      </div>
                      <div style={{background:POS[p.pos].bg+"70",borderRadius:4,padding:"1px 2px",marginTop:2}}><div style={{fontSize:8,color:POS[p.pos].text}}>{p.name.split(" ").pop()}</div></div>
                      <div className="cd" style={{fontSize:9,color:C.muted,marginTop:1}}>£{p.price}m</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Transfer hit warning */}
            {row.transfer_hits>0&&(
              <div style={{background:"rgba(192,82,42,0.15)",border:"1px solid rgba(192,82,42,0.3)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#E07272"}}>
                ⚠️ {row.transfer_hits} additional transfer{row.transfer_hits>1?"s":""} this GW — -{row.transfer_hits*4} pts deduction
              </div>
            )}

            {/* Squad list by position */}
            <div>
              <div className="cd" style={{fontSize:14,fontWeight:700,color:C.gold,letterSpacing:1,marginBottom:8,borderLeft:`3px solid ${C.gold}`,paddingLeft:8}}>SQUAD ({squadAll.length}/15)</div>
              {["GK","DEF","MID","FWD"].map(pos=>{
                const players=squadAll.filter(p=>p.pos===pos);
                return(
                  <div key={pos} style={{marginBottom:10}}>
                    <div style={{fontSize:9,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:4}}>{pos} — {players.length}/{POS[pos].limit}</div>
                    {players.map(p=>{
                      const isStart=startIds.has(p.id);
                      const isCap=p.id===row.captain_id,isVice=p.id===row.vice_captain_id;
                      return(
                        <div key={p.id} className="sr ch" onClick={()=>setModal(p.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,borderLeft:`3px solid ${isStart?POS[pos].text+"60":"transparent"}`}}>
                          <span style={{fontSize:16}}>{p.flag}</span>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                              {isCap&&<span style={{background:C.gold,color:C.dark,fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>CAP</span>}
                              {isVice&&<span style={{background:C.amber+"40",color:C.amber,fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>VICE</span>}
                              {!isStart&&<span style={{background:"rgba(255,255,255,0.08)",color:C.muted,fontSize:8,padding:"0 4px",borderRadius:2}}>BENCH</span>}
                            </div>
                            <div style={{fontSize:9,color:C.muted}}>{p.club} · Form: {p.form.toFixed(1)}</div>
                          </div>
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <button className="nb" onClick={e=>{e.stopPropagation();toggleCaptain(p.id);}} style={{fontSize:9,color:isCap?C.gold:C.muted,border:`1px solid ${isCap?C.gold:C.muted+"40"}`,borderRadius:3,padding:"2px 5px"}}>C</button>
                            <button className="nb" onClick={e=>{e.stopPropagation();setVice(p.id);}} style={{fontSize:9,color:isVice?C.amber:C.muted,border:`1px solid ${isVice?C.amber:C.muted+"40"}`,borderRadius:3,padding:"2px 5px"}}>V</button>
                          </div>
                          <div className="cd" style={{fontSize:14,fontWeight:700,color:C.amber,minWidth:32,textAlign:"right"}}>{p.pts}</div>
                          <div style={{fontSize:10,color:C.muted,minWidth:36,textAlign:"right"}}>£{p.price}m</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ══════════════════════
            TRANSFERS
        ══════════════════════ */}
        {tab==="transfers"&&(
          <div>
            {/* Header bar */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              {[
                {l:"Free Transfers",v:row.free_transfers,c:row.free_transfers>0?C.gold:C.muted},
                {l:"Transfer Hits",v:row.transfer_hits,c:row.transfer_hits>0?"#E07272":C.muted},
                {l:"Budget",v:`£${row.budget.toFixed(1)}m`,c:C.gold},
              ].map(s=>(
                <div key={s.l} style={{background:C.dark,border:`1px solid ${C.gold}15`,borderRadius:10,padding:"10px 10px",textAlign:"center"}}>
                  <div className="cd" style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:C.muted,marginTop:1}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* Search + filters */}
            <input className="inp cb" value={transferSearch} onChange={e=>setTSearch(e.target.value)} placeholder="Search player or club…" style={{marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
              {["ALL","GK","DEF","MID","FWD"].map(pos=>(
                <button key={pos} className="nb cb" onClick={()=>setTF(pos)}
                  style={{background:transferFilter===pos?C.gold:C.dark,color:transferFilter===pos?C.dark:C.muted,border:`1px solid ${transferFilter===pos?C.gold:C.gold+"20"}`,borderRadius:6,padding:"5px 11px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{pos}</button>
              ))}
              <div style={{flex:1}}/>
              {[["pts","Pts"],["price","£"],["form","Form"]].map(([k,l])=>(
                <button key={k} className="nb cb" onClick={()=>setTS(k)}
                  style={{background:transferSort===k?C.sage+"50":C.dark,color:transferSort===k?C.cream:C.muted,border:`1px solid ${C.gold}18`,borderRadius:6,padding:"5px 9px",fontSize:10,whiteSpace:"nowrap"}}>{l}</button>
              ))}
            </div>

            {/* Player list */}
            {avail.map(p=>{
              const inSq=squadIds.has(p.id);
              const ok=canAdd(p);
              return(
                <div key={p.id} onClick={()=>setModal(p.id)}
                  style={{background:C.dark,border:`1px solid ${inSq?C.gold+"40":C.gold+"12"}`,borderRadius:10,padding:"9px 11px",display:"flex",alignItems:"center",gap:9,marginBottom:7,cursor:"pointer",opacity:!inSq&&!ok?0.45:1}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:POS[p.pos].bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`2px solid ${POS[p.pos].text}35`,flexShrink:0}}>{p.flag}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                      <span style={{background:POS[p.pos].bg,color:POS[p.pos].text,fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:2}}>{p.pos}</span>
                      {inSq&&<span style={{background:C.gold+"25",color:C.gold,fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:2}}>IN SQUAD</span>}
                    </div>
                    <div style={{fontSize:9,color:C.muted}}>{p.club} · {p.sel}% sel · Form {p.form.toFixed(1)}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{textAlign:"center"}}>
                      <div className="cd" style={{fontSize:15,fontWeight:800,color:C.amber}}>{p.pts}</div>
                      <div style={{fontSize:8,color:C.muted}}>pts</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div className="cd" style={{fontSize:13,fontWeight:700,color:C.gold}}>£{p.price}m</div>
                      <div style={{fontSize:8,color:C.muted}}>price</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══════════════════════
            POINTS
        ══════════════════════ */}
        {tab==="points"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div className="cd" style={{fontSize:19,fontWeight:800,color:C.gold,letterSpacing:1}}>GW 27 POINTS</div>
                <div style={{fontSize:10,color:C.muted}}>{row.team_name}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="cd" style={{fontSize:28,fontWeight:800,color:C.amber}}>{gwPts}</div>
                <div style={{fontSize:9,color:C.muted}}>gameweek total</div>
              </div>
            </div>

            {/* Points explainer */}
            {row.transfer_hits>0&&(
              <div style={{background:"rgba(192,82,42,0.12)",border:"1px solid rgba(192,82,42,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#E07272"}}>Transfer penalty ({row.transfer_hits} hit{row.transfer_hits>1?"s":""})</span>
                <span className="cd" style={{fontSize:14,fontWeight:700,color:"#E07272"}}>-{row.transfer_hits*4} pts</span>
              </div>
            )}

            {/* Starting XI points */}
            <div className="cd" style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:6,paddingLeft:8}}>STARTING XI</div>
            {byIds(row.starting_ids).map(p=>{
              const isCap=p.id===row.captain_id,isVice=p.id===row.vice_captain_id;
              const pts=calcPoints(p,isCap,isVice,chip3x,true);
              const base=calcPoints(p,false,false,false,true);
              const s=p.stats;
              return(
                <div key={p.id} style={{background:C.dark,border:`1px solid ${C.gold}12`,borderRadius:10,marginBottom:7,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px"}}>
                    <div style={{fontSize:18}}>{p.flag}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                        {isCap&&<span style={{background:C.gold,color:C.dark,fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>CAP{chip3x?"×3":"×2"}</span>}
                        {isVice&&!isCap&&<span style={{background:C.amber+"30",color:C.amber,fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:2}}>VICE</span>}
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                        {s.goals>0&&<span style={{fontSize:9,color:"#72E0A0"}}>⚽ ×{s.goals}</span>}
                        {s.assists>0&&<span style={{fontSize:9,color:C.amber}}>🅰️ ×{s.assists}</span>}
                        {s.cs>0&&(p.pos==="GK"||p.pos==="DEF")&&<span style={{fontSize:9,color:"#72C4E0"}}>🛡️ CS</span>}
                        {s.saves>0&&p.pos==="GK"&&<span style={{fontSize:9,color:"#72C4E0"}}>🧤 {s.saves}</span>}
                        {s.yc>0&&<span style={{fontSize:9,color:"#FFA726"}}>🟨 ×{s.yc}</span>}
                        {s.rc>0&&<span style={{fontSize:9,color:"#E07272"}}>🟥</span>}
                        {s.bonus>0&&<span style={{fontSize:9,color:C.gold}}>★ {s.bonus}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="cd" style={{fontSize:22,fontWeight:800,color:C.amber}}>{pts}</div>
                      {(isCap||isVice)&&<div style={{fontSize:9,color:C.muted}}>base {base}</div>}
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Bench */}
            <div className="cd" style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:6,paddingLeft:8,marginTop:8}}>BENCH</div>
            {bench.map(p=>{
              const pts=row.active_chip==="bench_boost"?calcPoints(p,false,false,false,true):0;
              return(
                <div key={p.id} style={{background:C.dark,border:`1px solid ${C.gold}08`,borderRadius:10,marginBottom:6,padding:"8px 11px",display:"flex",alignItems:"center",gap:9,opacity:0.65}}>
                  <div style={{fontSize:16}}>{p.flag}</div>
                  <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600}}>{p.name}</span><div style={{fontSize:9,color:C.muted}}>{p.club}</div></div>
                  <div className="cd" style={{fontSize:18,fontWeight:700,color:pts>0?C.amber:C.muted}}>{pts>0?pts:"—"}</div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══════════════════════
            LEAGUES
        ══════════════════════ */}
        {tab==="leagues"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div className="cd" style={{fontSize:19,fontWeight:800,color:C.gold,letterSpacing:1}}>MINI-LEAGUE</div>
                <div style={{fontSize:10,color:C.muted}}>Live standings · all managers</div>
              </div>
              <button className="nb cb" onClick={fetchLeague} style={{fontSize:11,color:C.muted,border:`1px solid ${C.gold}20`,borderRadius:6,padding:"5px 10px"}}>{leagueLoading?"…":"↻ Refresh"}</button>
            </div>

            {/* Podium */}
            {leagueData.length>=3&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14,alignItems:"end"}}>
                {[leagueData[1],leagueData[0],leagueData[2]].map((m,i)=>{
                  const h=[108,128,92][i],r=i===0?2:i===1?1:3;
                  const rc=r===1?C.gold:r===2?"#C0C0C0":"#CD7F32";
                  return(
                    <div key={m.username} style={{textAlign:"center"}}>
                      <div style={{fontSize:20,marginBottom:2}}>{m.badge}</div>
                      <div style={{fontSize:10,fontWeight:600,marginBottom:2,color:m.username===row.username?C.gold:C.cream,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team_name}</div>
                      <div style={{background:rc+"20",border:`1px solid ${rc}40`,borderRadius:"8px 8px 0 0",height:h,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",padding:7}}>
                        <div className="cd" style={{fontSize:22,fontWeight:800,color:rc}}>{r}</div>
                        <div className="cd" style={{fontSize:14,fontWeight:700,color:C.amber}}>{(m.total_pts||0).toLocaleString()}</div>
                        <div style={{fontSize:9,color:C.muted}}>pts</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Full table */}
            <div style={{background:C.dark,border:`1px solid ${C.gold}15`,borderRadius:12,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"26px 1fr 52px 40px",padding:"6px 11px",borderBottom:`1px solid ${C.gold}20`}}>
                {["#","Team","Total","GW"].map(h=>(<div key={h} style={{fontSize:8,color:C.muted,fontWeight:700,letterSpacing:1,textTransform:"uppercase",textAlign:h!=="Team"?"center":"left"}}>{h}</div>))}
              </div>
              {leagueLoading&&<div style={{padding:18,textAlign:"center",color:C.muted,fontSize:13}}>Loading…</div>}
              {!leagueLoading&&leagueData.length===0&&<div style={{padding:18,textAlign:"center",color:C.muted,fontSize:13}}>No managers yet — share the link!</div>}
              {leagueData.map((m,i)=>(
                <div key={m.username} className="sr" style={{display:"grid",gridTemplateColumns:"26px 1fr 52px 40px",padding:"8px 11px",alignItems:"center",borderLeft:m.username===row.username?`3px solid ${C.gold}`:"3px solid transparent"}}>
                  <div className="cd" style={{fontSize:13,fontWeight:800,color:i<3?C.gold:C.muted,textAlign:"center"}}>{i+1}</div>
                  <div>
                    <div style={{fontSize:11,fontWeight:m.username===row.username?700:500,color:m.username===row.username?C.gold:C.cream}}>{m.badge} {m.team_name}</div>
                    <div style={{fontSize:8,color:C.muted}}>{m.username}</div>
                  </div>
                  <div className="cd" style={{fontSize:13,fontWeight:700,color:C.amber,textAlign:"center"}}>{(m.total_pts||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>{m.gw_pts||0}</div>
                </div>
              ))}
            </div>

            <div style={{marginTop:10,background:C.dark,border:`1px solid ${C.gold}15`,borderRadius:10,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,color:C.muted}}>League Code</div>
              <div className="cd" style={{fontSize:18,fontWeight:800,color:C.gold,letterSpacing:4}}>CAF-7291</div>
              <button className="nb cb" onClick={()=>navigator.clipboard?.writeText("CAF-7291")} style={{background:C.sage+"30",border:`1px solid ${C.sage}`,borderRadius:6,padding:"4px 10px",fontSize:10,color:C.cream}}>📋 Copy</button>
            </div>
          </div>
        )}

        {/* ══════════════════════
            FIXTURES
        ══════════════════════ */}
        {tab==="fixtures"&&(
          <div>
            <div style={{marginBottom:12}}>
              <div className="cd" style={{fontSize:19,fontWeight:800,color:C.gold,letterSpacing:1}}>GW28 FIXTURES</div>
              <div style={{fontSize:10,color:C.muted}}>Apr 12–14, 2026 · Difficulty rating shown</div>
            </div>

            {/* Difficulty key */}
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{fontSize:9,color:C.muted,marginRight:2}}>Difficulty:</div>
              {[[1,"Very Easy"],[2,"Easy"],[3,"Medium"],[4,"Hard"],[5,"Very Hard"]].map(([d,l])=>(
                <div key={d} style={{display:"flex",alignItems:"center",gap:3}}>
                  <DiffBadge d={d}/><span style={{fontSize:9,color:C.muted}}>{l}</span>
                </div>
              ))}
            </div>

            {FIXTURES.map((f,i)=>{
              const myPl=squadAll.filter(p=>p.nation===f.hc||p.nation===f.ac);
              return(
                <div key={i} style={{background:C.dark,border:`1px solid ${C.gold}15`,borderRadius:12,padding:"11px 13px",marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:8,color:C.muted,letterSpacing:1}}>GW28 · {f.date}</div>
                    <div style={{fontSize:10,color:C.amber,fontWeight:600}}>{f.time} CAT</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:26}}>{f.hf}</div>
                      <div className="cd" style={{fontSize:11,fontWeight:700,marginTop:2}}>{f.home.toUpperCase()}</div>
                      <div style={{marginTop:3}}><DiffBadge d={f.hd}/></div>
                    </div>
                    <div style={{textAlign:"center",padding:"4px 10px",background:C.sage+"25",borderRadius:8}}>
                      <div className="cd" style={{fontSize:15,fontWeight:800,color:C.gold}}>VS</div>
                    </div>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:26}}>{f.af}</div>
                      <div className="cd" style={{fontSize:11,fontWeight:700,marginTop:2}}>{f.away.toUpperCase()}</div>
                      <div style={{marginTop:3}}><DiffBadge d={f.ad}/></div>
                    </div>
                  </div>
                  {myPl.length>0&&(
                    <div style={{marginTop:9,paddingTop:9,borderTop:`1px solid ${C.gold}12`}}>
                      <div style={{fontSize:8,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Your players</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {myPl.map(p=>(
                          <div key={p.id} style={{display:"flex",alignItems:"center",gap:3,background:POS[p.pos].bg+"45",borderRadius:5,padding:"2px 7px"}}>
                            <span style={{fontSize:11}}>{p.flag}</span>
                            <span style={{fontSize:10,color:POS[p.pos].text,fontWeight:600}}>{p.name.split(" ").pop()}</span>
                            {p.id===row.captain_id&&<span style={{fontSize:8,color:C.gold,fontWeight:800}}>C</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

      </div>

      {/* ── PLAYER MODAL ── */}
      {modalPlayer&&(
        <PlayerModal
          player={modalPlayer}
          inSquad={squadIds.has(modalPlayer.id)}
          canAdd={canAdd(modalPlayer)}
          onAdd={()=>addPlayer(modalPlayer)}
          onRemove={()=>removePlayer(modalPlayer)}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

/* ── ROOT ── */
function Root(){
  const [teamRow,setTeamRow]=useState(null);
  const [booting,setBooting]=useState(true);

  useEffect(()=>{
    const saved=localStorage.getItem("caf_u");
    if(saved){
      sb.from("teams").select("*").eq("username",saved).maybeSingle()
        .then(({data})=>{if(data)setTeamRow(data);setBooting(false);});
    }else{setBooting(false);}
  },[]);

  if(booting)return(
    <div style={{minHeight:"100vh",background:"#0B2A1A",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{css}</style>
      <div className="cd" style={{fontSize:22,fontWeight:800,color:"#D4A017",letterSpacing:2}}>CAF FANTASY</div>
    </div>
  );
  if(!teamRow)return <LoginScreen onLogin={setTeamRow}/>;
  return <App key={teamRow.id} initialTeam={teamRow}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
